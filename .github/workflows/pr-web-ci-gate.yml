name: "PR Web CI Gate"

# Block-by-default merge gate for the WillowApp Web pipeline.
#
# A web PR is blocked the moment it opens and stays blocked until Web CI is
# confirmed green. One persistent github-actions[bot] review carries the block,
# moving through three states:
#   * on open / push  -> "⏳ waiting for Web CI"      (blocks immediately)
#   * any check fails  -> "⛔ Web CI failed: <links>"  (same review, updated body)
#   * all checks pass  -> dismissed                    (merge unblocks)
#
# Why a review blocks the merge: `main` enforces "Require pull request reviews",
# so an open CHANGES_REQUESTED review sets reviewDecision = CHANGES_REQUESTED and
# disables the merge button. No branch-protection / ruleset change is required.
#
# Why block-by-default: a plain "block-on-fail" gate leaves a window between PR
# open and CI completion where an early approval could merge a PR whose CI is
# still running (and may be about to fail). Blocking from open closes that window.
#
# Behavior:
#   * On green it DISMISSES the review (never APPROVES). Dismissing only withdraws
#     the block; approving would be a counted approval that could satisfy the
#     separate human review requirement and let a PR merge with no human review.
#
# Limitation:
#   * Soft block — anyone with write access can dismiss the review and merge
#     anyway. For a hard, un-bypassable block, add a required status check to
#     branch protection instead.

on:
  # Block immediately when a web PR opens / is pushed to (paths == the union of
  # the watched workflows' triggers, so this only fires for web-relevant PRs).
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths:
      - status.txt
  # Re-evaluate when a watched workflow finishes.
  workflow_run:
    workflows:
      - "Platform - Web - Format & Type check"
      - "Platform - Web - Test"
      - "Platform - Web - Build"
    types: [completed]

permissions:
  pull-requests: write
  actions: read
  contents: read

# Serialize evaluations for the same commit so the pull_request and per-workflow
# firings don't race on the single gate review.
concurrency:
  group: pr-web-ci-gate-${{ github.event.workflow_run.head_sha || github.event.pull_request.head.sha }}
  cancel-in-progress: false

jobs:
  gate:
    # For workflow_run, only gate pull-request-triggered runs.
    if: ${{ github.event_name == 'pull_request' || github.event.workflow_run.event == 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate web gates and update blocking review
        uses: actions/github-script@v7
        with:
          script: |
            const WATCHED = [
              "Platform - Web - Format & Type check",
              "Platform - Web - Test",
              "Platform - Web - Build",
            ];
            const MARKER = "<!-- ci-gate:web -->";
            const BOT = "github-actions[bot]";
            const PASS = ["success", "skipped", "neutral"];
            const { owner, repo } = context.repo;

            // 1) Resolve the PR + head commit from whichever event fired.
            let pr, headSha;
            if (context.eventName === "workflow_run") {
              headSha = context.payload.workflow_run.head_sha;
              const assoc = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                owner, repo, commit_sha: headSha,
              });
              pr = assoc.data.find((p) => p.state === "open");
              if (!pr) { core.info(`No open PR for ${headSha}; nothing to do.`); return; }
            } else {
              pr = context.payload.pull_request;
              headSha = pr.head.sha;
            }
            const pull_number = pr.number;

            // Ignore stale results — only act on the PR's current head.
            if (pr.head.sha !== headSha) {
              core.info(`Run is for ${headSha} but PR head is ${pr.head.sha}; skipping stale evaluation.`);
              return;
            }

            // 2) Latest run per watched workflow for this commit.
            //    Path-filtered, so a PR may trigger only some — we evaluate what ran.
            const runs = await github.paginate(github.rest.actions.listWorkflowRunsForRepo, {
              owner, repo, head_sha: headSha, event: "pull_request", per_page: 100,
            });
            const latestByName = new Map();
            for (const r of runs) {
              if (!WATCHED.includes(r.name)) continue;
              const prev = latestByName.get(r.name);
              if (!prev || r.run_number > prev.run_number) latestByName.set(r.name, r);
            }
            const present = [...latestByName.values()];
            const pending = present.filter((r) => r.status !== "completed").map((r) => r.name);
            const failedRuns = present.filter(
              (r) => r.status === "completed" && !PASS.includes(r.conclusion),
            );
            const allGreen = present.length > 0 && pending.length === 0 && failedRuns.length === 0;
            core.info(`present: ${present.map((r) => `${r.name}=${r.conclusion || r.status}`).join(", ") || "none"}`);
            core.info(`pending=${pending.length} failed=${failedRuns.length} allGreen=${allGreen}`);

            // 3) Our existing open gate review(s) — only the bot's, only ours (marker).
            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner, repo, pull_number, per_page: 100,
            });
            const ourActiveBlocks = reviews.filter(
              (r) => r.state === "CHANGES_REQUESTED" && r.user?.login === BOT && (r.body || "").includes(MARKER),
            );

            const WAIT_BODY = [
              MARKER,
              `### ⏳ Merge blocked — waiting for Web CI`,
              ``,
              `Web CI is still running. This review updates with any failures and is ` +
                `dismissed automatically once all web checks pass.`,
            ].join("\n");

            const failBody = () => [
              MARKER,
              `### ⛔ Merge blocked — Web CI failed`,
              ``,
              `These web CI checks failed — open them to see why and fix:`,
              ...failedRuns.map((r) => `- [\`${r.name}\`](${r.html_url}) ❌`),
              ``,
              `Push a fix (or re-run the job). This review is dismissed automatically once all web checks pass.`,
            ].join("\n");

            async function dismissOurBlocks() {
              for (const r of ourActiveBlocks) {
                await github.rest.pulls.dismissReview({
                  owner, repo, pull_number, review_id: r.id, message: "All web CI gates passed — gate cleared.",
                });
              }
              if (ourActiveBlocks.length) core.info(`Dismissed ${ourActiveBlocks.length} gate review(s).`);
            }

            async function ensureBlock(body) {
              if (ourActiveBlocks.length === 0) {
                await github.rest.pulls.createReview({ owner, repo, pull_number, event: "REQUEST_CHANGES", body });
                core.info("Submitted gate review.");
                return;
              }
              // Keep one review; update its body if changed; dismiss any duplicates.
              const keep = ourActiveBlocks[0];
              if ((keep.body || "") !== body) {
                await github.rest.pulls.updateReview({ owner, repo, pull_number, review_id: keep.id, body });
                core.info("Updated gate review body.");
              } else {
                core.info("Gate review already current.");
              }
              for (const extra of ourActiveBlocks.slice(1)) {
                await github.rest.pulls.dismissReview({
                  owner, repo, pull_number, review_id: extra.id, message: "Deduplicated gate review.",
                });
              }
            }

            // 4) Decide. Default is blocked; only all-green dismisses.
            if (failedRuns.length > 0) {
              await ensureBlock(failBody());
            } else if (allGreen) {
              await dismissOurBlocks();
            } else {
              await ensureBlock(WAIT_BODY);
            }

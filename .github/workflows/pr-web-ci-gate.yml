name: "PR Web CI Gate"

# Single "catch-all" merge gate for the WillowApp Web pipeline.
#
# It runs AFTER the web CI workflows finish (via `workflow_run`), reads their
# conclusions for the PR's head commit, and submits a "Request changes" review
# from github-actions[bot] when any of them failed — dismissing it automatically
# once they all pass.
#
# Why a review blocks the merge: `main` enforces "Require pull request reviews",
# so an open CHANGES_REQUESTED review sets reviewDecision = CHANGES_REQUESTED and
# disables the merge button. No branch-protection / ruleset change is required.
#
# Why a review (not a comment): it needs no changed-file anchor, survives across
# pushes (dismiss_stale only drops *approvals*, not changes-requested), and
# re-blocking after a bypass is just "submit another review".
#
# Limitations:
#   * Soft block — anyone with write access can dismiss the review and merge
#     anyway. For a hard, un-bypassable block, add a required status check to
#     branch protection instead.
#   * On green it DISMISSES (never APPROVES) — approving would wrongly count
#     toward the human review-approval requirement.

on:
  workflow_run:
    workflows:
      - "Platform - Web - Format & Type check"
      - "Platform - Web - Test"
      - "Platform - Web - Build"
    types: [completed]

permissions:
  pull-requests: write
  actions: read
  contents: read

# Serialize evaluations for the same commit. The gate fires once per watched
# workflow completion (up to 3x per commit) plus on reruns; without this, parallel
# runs race and can submit duplicate reviews.
concurrency:
  group: pr-web-ci-gate-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: false

jobs:
  gate:
    # Only gate pull-request-triggered runs (ignore pushes to main, etc.).
    if: ${{ github.event.workflow_run.event == 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate web gates and update blocking review
        uses: actions/github-script@v7
        env:
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        with:
          script: |
            const WATCHED = [
              "Platform - Web - Format & Type check",
              "Platform - Web - Test",
              "Platform - Web - Build",
            ];
            const MARKER = "<!-- ci-gate:web -->";
            const BOT = "github-actions[bot]";
            const PASS = ["success", "skipped", "neutral"];
            const headSha = process.env.HEAD_SHA;
            const server = process.env.GITHUB_SERVER_URL || "https://github.com";
            const { owner, repo } = context.repo;

            // 1) Find the open PR for this commit.
            const assoc = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner, repo, commit_sha: headSha,
            });
            const pr = assoc.data.find((p) => p.state === "open");
            if (!pr) {
              core.info(`No open PR associated with ${headSha}; nothing to do.`);
              return;
            }
            const pull_number = pr.number;

            // If newer commits exist, these results are stale — a fresh run will settle it.
            if (pr.head.sha !== headSha) {
              core.info(`Run is for ${headSha} but PR head is ${pr.head.sha}; skipping stale evaluation.`);
              return;
            }

            // 2) Latest run per watched workflow for this commit.
            //    NOTE: we evaluate only the watched workflows that actually produced a run.
            //    The web workflows are path-filtered, so a given PR may legitimately trigger
            //    only some of them — requiring all three to be present would deadlock those
            //    PRs (waiting forever on a workflow that will never run). The gate fires again
            //    on each completion, so the final firing has the complete picture.
            const runs = await github.paginate(github.rest.actions.listWorkflowRunsForRepo, {
              owner, repo, head_sha: headSha, event: "pull_request", per_page: 100,
            });
            const latestByName = new Map();
            for (const r of runs) {
              if (!WATCHED.includes(r.name)) continue;
              const prev = latestByName.get(r.name);
              if (!prev || r.run_number > prev.run_number) latestByName.set(r.name, r);
            }
            const present = [...latestByName.values()];
            const pending = present.filter((r) => r.status !== "completed").map((r) => r.name);
            const failed = present
              .filter((r) => r.status === "completed" && !PASS.includes(r.conclusion))
              .map((r) => r.name);

            core.info(`watched: ${present.map((r) => `${r.name}=${r.conclusion || r.status}`).join(", ") || "none"}`);
            core.info(`pending: ${pending.join(", ") || "none"} | failed: ${failed.join(", ") || "none"}`);

            // 3) Find our existing open blocking review(s) — only the bot's, only ours (marker).
            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner, repo, pull_number, per_page: 100,
            });
            const ourActiveBlocks = reviews.filter(
              (r) => r.state === "CHANGES_REQUESTED" && r.user?.login === BOT && (r.body || "").includes(MARKER),
            );

            async function dismissOurBlocks() {
              for (const r of ourActiveBlocks) {
                await github.rest.pulls.dismissReview({
                  owner, repo, pull_number, review_id: r.id, message: "All web CI gates passed — gate cleared.",
                });
              }
              if (ourActiveBlocks.length) core.info(`Dismissed ${ourActiveBlocks.length} gate review(s).`);
            }

            // 4) Decide.
            if (failed.length > 0) {
              // Already blocking with an open gate review → idempotent no-op.
              if (ourActiveBlocks.length > 0) {
                core.info("An open gate review already blocks this PR; leaving it.");
                return;
              }
              const body = [
                MARKER,
                `### ⛔ Merge blocked — Web CI failed`,
                ``,
                `The following web CI gate(s) did not pass:`,
                ...failed.map((n) => `- \`${n}\``),
                ``,
                `This PR is blocked until they pass. See the [Checks tab](${server}/${owner}/${repo}/pull/${pull_number}/checks). ` +
                  `This review is dismissed automatically when all web gates are green.`,
              ].join("\n");
              await github.rest.pulls.createReview({
                owner, repo, pull_number, event: "REQUEST_CHANGES", body,
              });
              core.info("Submitted REQUEST_CHANGES gate review.");
              return;
            }

            if (pending.length > 0) {
              core.info("Some web gates still pending; leaving review state unchanged.");
              return;
            }

            // Nothing failed, nothing pending → all clear: dismiss our gate review(s).
            await dismissOurBlocks();
            core.info("All web gates passed; PR not blocked by web CI.");
